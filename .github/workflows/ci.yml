name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Compile C++ engines
        run: |
          cd fusionmind4/realtime/cpp
          # Stack engine (primary — no AVX-512, fully portable)
          g++ -O3 -shared -fPIC -std=c++17 -o libfusionmind_stack.so stack_api.cpp
          # ML prediction engine (portable)
          g++ -O3 -shared -fPIC -std=c++17 -o libfusionmind_rt.so fast_engine_api.cpp
          ls -la *.so

      - name: Compile AVX-512 kernels (optional)
        continue-on-error: true
        run: |
          cd fusionmind4/realtime/cpp
          # Causal kernels use AVX-512 — requires Intel/AMD Zen4+
          g++ -O3 -mavx512f -shared -fPIC -std=c++17 -o libfusionmind_causal.so causal_kernels.cpp 2>/dev/null || \
          g++ -O3 -shared -fPIC -std=c++17 -DFUSIONMIND_NO_AVX512 -o libfusionmind_causal.so causal_kernels.cpp 2>/dev/null || \
          echo "AVX-512 kernels not available on this CPU (Python fallback will be used)"

      - name: Run tests
        env:
          FM_SKIP_S3: "1"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_real_data.py

      - name: Run real-data tests (fixtures only)
        env:
          FM_SKIP_S3: "1"
        run: |
          pytest tests/test_real_data.py -v --tb=short -k "not LiveS3"

      - name: Coverage report
        if: matrix.python-version == '3.12'
        env:
          FM_SKIP_S3: "1"
        run: |
          pip install pytest-cov
          pytest tests/ --cov=fusionmind4 --cov-report=term-missing --ignore=tests/test_real_data.py

      - name: Verify quickstart
        run: |
          python examples/quickstart.py
