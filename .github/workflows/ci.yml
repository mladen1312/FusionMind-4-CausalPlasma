name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Compile C++ engines
        run: |
          cd fusionmind4/realtime/cpp
          # Stack engine and ML engine (portable, no SIMD intrinsics)
          g++ -O3 -shared -fPIC -std=c++17 -o libfusionmind_stack.so stack_api.cpp
          g++ -O3 -shared -fPIC -std=c++17 -o libfusionmind_rt.so fast_engine_api.cpp
          ls -la *.so
          echo "Note: libfusionmind_causal.so requires AVX-512 (Intel/Zen4+)"
          echo "Python fallback is used for causal kernels on this platform"

      - name: Run tests
        env:
          FM_SKIP_S3: "1"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_real_data.py

      - name: Run real-data tests (fixtures only)
        env:
          FM_SKIP_S3: "1"
        run: |
          pytest tests/test_real_data.py -v --tb=short -k "not LiveS3"

      - name: Coverage report
        if: matrix.python-version == '3.12'
        env:
          FM_SKIP_S3: "1"
        run: |
          pip install pytest-cov
          pytest tests/ --cov=fusionmind4 --cov-report=term-missing --ignore=tests/test_real_data.py

      - name: Verify quickstart
        run: |
          python examples/quickstart.py
